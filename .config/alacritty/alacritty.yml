env:
  TERM: xterm-256color
shell:
  program: /opt/homebrew/bin/tmux
  args:
    - -u
    - new-session
    - -A
    - -s
    - Main
window:
  dimensions:
    columns: 100
    lines: 30
  padding:
    x: 6
    y: 6
  decorations: buttonless
  opacity: 0.98
scrolling:
  history: 10000
  multiplier: 1
font:
  normal:
    family: "MesloLGS Nerd Font"
    # family: "JuliaMono"
    # family: "Maple Mono"
    # family: "JetBrainsMono Nerd Font"
    # family: "Monocraft"
    # family: "Comic Code Ligatures"
    # family: "BQN386 Unicode"
    # style: Regular
  size: 20.0
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0

colors:
  # Default colors
  primary:
    background: '#282c32'
    foreground: '#c9cdd5'
  cursor:
    text: '#000000'
    cursor: '#eeeeee'
  selection:
    text: '#abb2bf'
    background: '#323844'

  # Normal colors
  normal:
    black:   '#21252b'
    red:     '#e06c75'
    green:   '#98c379'
    yellow:  '#e5c07b'
    blue:    '#61afef'
    magenta: '#c678dd'
    cyan:    '#56b6c2'
    white:   '#abb2bf'

  # Bright colors
  bright:
    black:   '#767676'
    red:     '#e06c75'
    green:   '#98c379'
    yellow:  '#e5c07b'
    blue:    '#61afef'
    magenta: '#c678dd'
    cyan:    '#56b6c2'
    white:   '#abb2bf'

cursor:
  style: Block

key_bindings:
    - { key: W,     mods: Command,       chars: "\x01\x78" } # Close window
    - { key: D,     mods: Command,       chars: "\x01\x7c" } # Split window

    - { key: T,     mods: Command,       chars: "\x01\x63" } # New window
    - { key: T,     mods: Command|Shift, chars: "\x01\x74" } # New window, same dir

    - { key: Tab,   mods: Control|Shift, chars: "\x01\x70" } # Move to left window
    - { key: Tab,   mods: Control,       chars: "\x01\x6e" } # Move to right window

    - { key: PageUp,   mods: Control|Shift, chars: "\x01\x3c" } # Swap to left window
    - { key: PageDown, mods: Control|Shift, chars: "\x01\x3e" } # Swap to right window

    # Navigate to tab
    - { key: Key1,  mods: Command,       chars: "\x01\x31" }
    - { key: Key2,  mods: Command,       chars: "\x01\x32" }
    - { key: Key3,  mods: Command,       chars: "\x01\x33" }
    - { key: Key4,  mods: Command,       chars: "\x01\x34" }
    - { key: Key5,  mods: Command,       chars: "\x01\x35" }
    - { key: Key6,  mods: Command,       chars: "\x01\x36" }
    - { key: Key7,  mods: Command,       chars: "\x01\x37" }
    - { key: Key8,  mods: Command,       chars: "\x01\x38" }
    - { key: Key9,  mods: Command,       chars: "\x01\x39" }

    # Switch Sessions
    - { key: Left,  mods: Command,       chars: "\x01\x28" }
    - { key: Right, mods: Command,       chars: "\x01\x29" }

    - { key: N,     mods: Command,       chars: "\x01\x53" } # New Sessions
    - { key: N,     mods: Command|Shift, command: {
        program: "nohup", args: ["alacritty", "-e", "zsh"]
      }}
